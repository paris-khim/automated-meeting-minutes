version: '3.8'
services:
  cognitive-mom-api:
    build: .
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - TRANSFORMERS_CACHE=/app/.cache
    volumes:
      - .cache:/app/.cache
